<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Карты лояльности</title>
<style>
  :root {
    --bg: #f3f7f0; --surface: #ffffff; --ink: #16261b; --muted: #6b7c70; --line: #e2ebdd;
    --brand: #2f8f4e; --brand-dark: #24713e; --brand-soft: #e7f4ea;
    --amber: #c9821b; --amber-soft: #fdf1dd; --red: #c8402f; --red-soft: #fbe8e5;
    --radius: 14px; --shadow: 0 1px 2px rgba(20,40,25,.05), 0 6px 20px rgba(20,40,25,.04);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.45; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 96px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.02em; }
  h2 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; }
  h3 { font-size: 12px; margin: 0 0 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 16px; }
  label { display: block; font-size: 12.5px; color: var(--muted); margin: 12px 0 5px; font-weight: 600; }
  input, select { width: 100%; padding: 12px 13px; border: 1px solid var(--line); border-radius: 10px; font-size: 15px; background: #fff; color: var(--ink); font-family: var(--font); transition: border-color .15s, box-shadow .15s; }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  button { cursor: pointer; border: none; border-radius: 10px; padding: 12px 16px; font-size: 15px; font-weight: 600; font-family: var(--font); transition: transform .05s, background .15s, opacity .15s; }
  button:active { transform: scale(.98); }
  .btn-primary { background: var(--brand); color: #fff; width: 100%; margin-top: 16px; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-secondary { background: var(--brand-soft); color: var(--brand-dark); }
  .btn-ghost { background: #f1f4ef; color: var(--ink); }
  .btn-danger { background: var(--red-soft); color: var(--red); }
  .btn-sm { padding: 8px 12px; font-size: 13px; border-radius: 8px; }
  .row-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .row-btns > button { flex: 1; min-width: 110px; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.err { color: var(--red); } .msg.ok { color: var(--brand-dark); }
  .hidden { display: none !important; }
  .banner { background: var(--amber-soft); border: 1px solid #f2dcae; color: #7a5310; font-size: 13px; padding: 11px 13px; border-radius: 10px; margin-bottom: 14px; }
  .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
  .brandmark { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .brandmark .leaf { width: 26px; height: 26px; flex: none; }
  .whoami { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.3; }
  .whoami b { color: var(--ink); display: block; font-size: 13px; }
  .link-btn { background: none; color: var(--muted); font-weight: 500; font-size: 12.5px; padding: 4px 0; }
  .tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; display: flex; background: rgba(255,255,255,.94); backdrop-filter: blur(8px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; text-align: center; padding: 9px 2px 10px; font-size: 11px; color: var(--muted); background: none; border-radius: 0; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab svg { width: 21px; height: 21px; }
  .tab.active { color: var(--brand); }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 100px; font-size: 12.5px; font-weight: 700; }
  .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .s-active { background: var(--brand-soft); color: var(--brand-dark); }
  .s-soon { background: var(--amber-soft); color: var(--amber); }
  .s-expired { background: var(--red-soft); color: var(--red); }
  .s-no_data { background: #eef1ec; color: var(--muted); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 6px; text-align: center; }
  .stat .n { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .stat .l { font-size: 10.5px; color: var(--muted); margin-top: 2px; font-weight: 600; }
  .stat.a .n { color: var(--brand-dark); } .stat.w .n { color: var(--amber); } .stat.e .n { color: var(--red); }
  .clist { display: flex; flex-direction: column; gap: 10px; }
  .citem { border: 1px solid var(--line); border-radius: 12px; padding: 13px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .citem .who { min-width: 0; }
  .citem .nm { font-weight: 700; font-size: 15px; }
  .citem .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .citem .cid { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: var(--muted); }
  .citem .right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex: none; }
  .icon-btn { background: #f1f4ef; border-radius: 8px; padding: 7px; display: inline-flex; cursor: pointer; }
  .icon-btn svg { width: 16px; height: 16px; display: block; }
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 8px 16px; font-size: 14px; margin: 14px 0; }
  .kv dt { color: var(--muted); } .kv dd { margin: 0; font-weight: 600; }
  .kv a.tel { color: var(--brand-dark); text-decoration: none; }
  #scan-stage { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #0d1a12; margin-bottom: 4px; }
  #scan-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #scan-stage::after { content: ''; position: absolute; inset: 18%; border: 3px solid rgba(255,255,255,.85); border-radius: 16px; box-shadow: 0 0 0 100vmax rgba(0,0,0,.25); pointer-events: none; }
  .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 14px; }
  .qr-cell { text-align: center; border: 1px dashed var(--line); border-radius: 10px; padding: 10px; background: #fff; }
  .qr-cell img { width: 100%; height: auto; }
  .qr-cell .cap { font-size: 11px; margin-top: 5px; font-family: ui-monospace, monospace; color: var(--muted); }
  .overlay { position: fixed; inset: 0; background: rgba(15,25,18,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #fff; border-radius: 16px; padding: 22px; max-width: 380px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
  .modal-x { float: right; background: #f1f4ef; border-radius: 8px; width: 30px; height: 30px; padding: 0; font-size: 18px; line-height: 1; color: var(--muted); }
  .public-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .public-card { max-width: 360px; width: 100%; background: var(--surface); border-radius: 20px; padding: 32px 26px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--line); }
  .public-card .leaf { width: 40px; height: 40px; margin: 0 auto 14px; display: block; }
  .public-status-icon { width: 72px; height: 72px; margin: 6px auto 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .public-status-icon svg { width: 40px; height: 40px; }
  .pi-active { background: var(--brand-soft); color: var(--brand-dark); }
  .pi-soon { background: var(--amber-soft); color: var(--amber); }
  .pi-expired { background: var(--red-soft); color: var(--red); }
  .public-card .big { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
  .public-card .date { font-size: 15px; color: var(--muted); }
  .public-card .date b { color: var(--ink); }
  .public-foot { margin-top: 22px; font-size: 12px; color: var(--muted); }
  /* Наклейка под физический размер карты (85.6 × 54 мм — стандарт банковской карты) */
  .pcard { width: 85.6mm; height: 54mm; box-sizing: border-box; padding: 3mm; border: 0.3mm dashed #aaa; border-radius: 2mm; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.8mm; background: #fff; page-break-inside: avoid; break-inside: avoid; }
  .pcard-head { display: flex; align-items: center; gap: 1.3mm; font-weight: 700; font-size: 9.5px; color: var(--ink); text-align: center; }
  .pcard-head svg { width: 10px; height: 10px; flex: none; }
  .pcard-qr { width: 28mm; height: 28mm; }
  .pcard-qr .qr-slot, .pcard-qr img { width: 100%; height: 100%; display: block; }
  .pcard-id { font-family: ui-monospace, Menlo, monospace; font-size: 8.5px; color: #666; letter-spacing: .02em; }
  .sheet { display: grid; grid-template-columns: repeat(2, 85.6mm); gap: 4mm; justify-content: center; }
  .sheet-hint { font-size: 12px; color: var(--muted); margin: 10px 0 0; }
  #print-sheet { display: none; }
  @media print {
    @page { size: A4; margin: 10mm; }
    body.printing #print-sheet { display: block !important; }
    body.printing .topbar, body.printing .tabs, body.printing .wrap, body.printing .overlay { display: none !important; }
  }
  @media print { .topbar, .tabs, .no-print { display: none !important; } .wrap { padding: 0; max-width: 100%; } .card { box-shadow: none; border: none; } .qr-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>
<div id="root"></div>
<div id="print-sheet"></div>
<script>
// ============================================================================
// НАСТРОЙКА: вставьте сюда ссылку вашего Apps Script Web App (заканчивается на /exec)
// ============================================================================
var API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzIMqmhLsldw-Wi0btoGDtpgLlXQNIcVrk6tGMB9owQv_wOAD-sw_KUkz3p_ia4mGvK/exec';
// Название магазина — печатается на наклейках карт
var SHOP_NAME = 'ФРЭШ & ФРОСТ';
// ============================================================================

// ---- SVG-иконки (inline, чтобы не тянуть внешние зависимости) ----
var ICON = {
  leaf: '<svg class="leaf" viewBox="0 0 24 24" fill="none"><path d="M4 20C4 12 9 5 20 4C20 15 14 20 6 20C6 20 5.5 16 9 12" stroke="#2f8f4e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  scan: '<svg viewBox="0 0 24 24" fill="none"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  list: '<svg viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  print: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-4a2 2 0 012-2h16a2 2 0 012 2v4a2 2 0 01-2 2h-2M6 14h12v7H6z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  people: '<svg viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  qr: '<svg viewBox="0 0 24 24" fill="none"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h3v3h-3zM19 14h2M21 19v2M17 21h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  edit: '<svg viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  clock: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>'
};

var STATUS_LABEL = { active: 'Активна', soon: 'Скоро истекает', expired: 'Истекла', no_data: 'Нет данных' };

// ---- Обёртки над API ----
function apiGet(action, params) {
  var url = API_BASE_URL + '?action=' + encodeURIComponent(action);
  for (var k in (params || {})) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  return fetch(url).then(function (r) { return r.json(); });
}
function apiPost(action, payload) {
  var body = Object.assign({ action: action }, payload || {});
  return fetch(API_BASE_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) })
    .then(function (r) { return r.json(); });
}
// Несколько независимых сервисов генерации QR — если один заблокирован сетью/оператором, пробуем следующий
var QR_PROVIDERS = [
  function (text, size) { return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&margin=8&data=' + encodeURIComponent(text); },
  function (text, size) { return 'https://quickchart.io/qr?text=' + encodeURIComponent(text) + '&size=' + size + '&margin=1'; },
  function (text, size) { return 'https://chart.googleapis.com/chart?cht=qr&chs=' + size + 'x' + size + '&chl=' + encodeURIComponent(text); }
];

/** Возвращает HTML одного QR (обёрнутый в .qr-slot) с автопереключением на резервный провайдер при сбое */
function qrImgHtml(text, size, extraStyle) {
  var url0 = QR_PROVIDERS[0](text, size);
  return '<div class="qr-slot">' +
    '<img style="' + (extraStyle || '') + '" data-qrtext="' + encodeURIComponent(text) + '" data-size="' + size + '" data-attempt="0" ' +
    'width="' + size + '" height="' + size + '" src="' + url0 + '" onerror="qrRetry(this)" onload="this.onerror=null" alt="QR-код">' +
    '</div>';
}

function qrRetry(img) {
  var attempt = parseInt(img.getAttribute('data-attempt') || '0', 10) + 1;
  var text = decodeURIComponent(img.getAttribute('data-qrtext'));
  var size = img.getAttribute('data-size') || 220;
  if (attempt >= QR_PROVIDERS.length) {
    var slot = img.closest('.qr-slot');
    if (slot) {
      slot.innerHTML =
        '<div style="border:1px dashed var(--line); border-radius:10px; padding:16px; text-align:center;">' +
          '<p class="msg err" style="margin:0 0 10px;">Не удалось загрузить QR — нет связи с сервисом генерации (проверьте интернет или переключитесь на Wi-Fi).</p>' +
          '<div class="row-btns">' +
            '<button class="btn-secondary btn-sm" onclick="qrRetrySlot(this,\'' + encodeURIComponent(text) + '\',' + size + ')">Повторить</button>' +
            '<button class="btn-ghost btn-sm" onclick="copyLink(\'' + encodeURIComponent(text) + '\')">Скопировать ссылку</button>' +
          '</div>' +
        '</div>';
    }
    return;
  }
  img.setAttribute('data-attempt', attempt);
  img.src = QR_PROVIDERS[attempt](text, size);
}

function qrRetrySlot(btn, encText, size) {
  var slot = btn.closest('.qr-slot');
  if (slot) slot.outerHTML = qrImgHtml(decodeURIComponent(encText), size, '');
}

function copyLink(encText) {
  var text = decodeURIComponent(encText);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { toast('Ссылка скопирована'); })
      .catch(function () { window.prompt('Скопируйте ссылку:', text); });
  } else { window.prompt('Скопируйте ссылку:', text); }
}

function qrImageUrl(text, size) { return QR_PROVIDERS[0](text, size || 200); }

/** HTML одной наклейки-карты (85.6×54мм): логотип+название магазина, QR, номер карты */
function cardStickerHtml(id) {
  return '<div class="pcard">' +
    '<div class="pcard-head">' + ICON.leaf + '<span>' + esc(SHOP_NAME) + '</span></div>' +
    '<div class="pcard-qr">' + qrImgHtml(cardLink(id), 260, 'width:100%;height:100%;display:block;') + '</div>' +
    '<div class="pcard-id">' + esc(id) + '</div>' +
  '</div>';
}

/** Печать одной или нескольких карт-наклеек: рендерим в скрытый лист и вызываем печать */
function printCards(ids) {
  var sheet = document.getElementById('print-sheet');
  sheet.innerHTML = '<div class="sheet">' + ids.map(cardStickerHtml).join('') + '</div>';
  document.body.classList.add('printing');
  window.print();
}
window.addEventListener('afterprint', function () {
  document.body.classList.remove('printing');
  var sheet = document.getElementById('print-sheet');
  if (sheet) sheet.innerHTML = '';
});
function baseUrl() { return window.location.origin + window.location.pathname; }
function cardLink(id) { return baseUrl() + '?id=' + encodeURIComponent(id); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[c]; }); }

var state = { user: null, scanning: false, starting: false, stream: null, rafId: null, startTimeout: null };
var root = document.getElementById('root');

// ============================ РОУТИНГ ПРИ ЗАГРУЗКЕ ============================
window.addEventListener('DOMContentLoaded', function () {
  var params = new URLSearchParams(window.location.search);
  var cardId = params.get('id');
  // Клиент отсканировал карту (в URL есть id) и НЕ является вошедшим сотрудником → публичная страница
  var savedUser = sessionStorage.getItem('crmUser');
  if (cardId && !savedUser) { renderPublic(cardId); return; }
  if (savedUser) { try { state.user = JSON.parse(savedUser); } catch (e) {} }
  if (state.user) renderApp(cardId); else renderLogin();
});

// ============================ ПУБЛИЧНАЯ СТРАНИЦА ============================
function renderPublic(cardId) {
  root.innerHTML = '<div class="public-screen"><div class="public-card">' +
    ICON.leaf +
    '<div id="pubBody"><p class="sub" style="margin:20px 0">Проверяем карту…</p></div>' +
    '<div class="public-foot">Карта лояльности · ' + esc(cardId) + '</div>' +
    '</div></div>';

  apiGet('getPublicStatus', { id: cardId }).then(function (res) {
    var body = document.getElementById('pubBody');
    if (!res || !res.found) {
      body.innerHTML = '<div class="public-status-icon pi-expired">' + ICON.x + '</div>' +
        '<p class="big">Карта не найдена</p><p class="date">Обратитесь к сотруднику магазина</p>';
      return;
    }
    if (res.status === 'expired' || res.status === 'no_data') {
      body.innerHTML = '<div class="public-status-icon pi-expired">' + ICON.x + '</div>' +
        '<p class="big">Подписка неактивна</p>' +
        (res.endDate ? '<p class="date">Истекла <b>' + esc(res.endDate) + '</b></p>' : '<p class="date">Оформите подписку на кассе</p>');
    } else if (res.status === 'soon') {
      body.innerHTML = '<div class="public-status-icon pi-soon">' + ICON.clock + '</div>' +
        '<p class="big">Подписка активна</p>' +
        '<p class="date">Действует до <b>' + esc(res.endDate) + '</b><br>осталось ' + res.daysLeft + ' дн.</p>';
    } else {
      body.innerHTML = '<div class="public-status-icon pi-active">' + ICON.check + '</div>' +
        '<p class="big">Подписка активна</p>' +
        '<p class="date">Действует до <b>' + esc(res.endDate) + '</b></p>';
    }
  }).catch(function () {
    document.getElementById('pubBody').innerHTML = '<p class="date">Не удалось проверить карту. Попробуйте позже.</p>';
  });
}

        '<label>Логин</label><input id="lg-user" autocomplete="username">' +
        '<label>Пароль</label><input id="lg-pass" type="password" autocomplete="current-password">' +
        '<button class="btn-primary" id="lg-btn">Войти</button>' +

function doLogin() {
  var u = document.getElementById('lg-user').value.trim();
  var p = document.getElementById('lg-pass').value;
  var msg = document.getElementById('lg-msg');
  msg.classList.add('hidden');
  if (!u || !p) return;
  var btn = document.getElementById('lg-btn');
  btn.textContent = 'Входим…'; btn.disabled = true;
  apiPost('authenticate', { username: u, password: p }).then(function (res) {
    btn.textContent = 'Войти'; btn.disabled = false;
    if (res.success) {
      state.user = { username: u, role: res.role, fullName: res.fullName };
      sessionStorage.setItem('crmUser', JSON.stringify(state.user));
      renderApp(null);
    } else { msg.textContent = res.error || 'Ошибка входа'; msg.classList.remove('hidden'); }
  }).catch(function (e) {
    btn.textContent = 'Войти'; btn.disabled = false;
    msg.textContent = 'Нет связи с сервером: ' + e.message; msg.classList.remove('hidden');
  });
}

function doLogout() {
  stopScanner();
  state.user = null;
  sessionStorage.removeItem('crmUser');
  // убираем ?id из адреса, чтобы после выхода не улететь на публичную страницу
  history.replaceState(null, '', baseUrl());
  renderLogin();
}

function scanStatus(text, isErr) {
  var el = document.getElementById('scan-status');
  if (!el) return;
  el.textContent = text || '';

  el.classList.toggle('hidden', !text);

// Ленивая загрузка резервного декодера jsQR (только если нет нативного BarcodeDetector)
function loadJsQR() {
  if (window.jsQR) return Promise.resolve(window.jsQR);
  return new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = function () { resolve(window.jsQR); };
    s.onerror = function () { reject(new Error('jsQR load failed')); };
    document.head.appendChild(s);
  });
}

function toggleScanner() {
  if (state.scanning || state.starting) { stopScanner(); return; }
  startScanner();
}

function startScanner() {
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  var video = document.getElementById('scan-video');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    scanStatus('Этот браузер не поддерживает камеру. Откройте сайт в Chrome, либо введите номер карты вручную.', true);
    return;
  }

  state.starting = true;
  btn.textContent = 'Запуск камеры…';
  btn.disabled = true;
  scanStatus('Запрашиваем доступ к камере — если на телефоне появится системное окно, нажмите «Разрешить»…');

  // Страховочный таймаут: если за 6 сек камера не пошла — не виснем, а показываем ошибку
  state.startTimeout = setTimeout(function () {
    if (state.starting && !state.scanning) {
      failScan('Камера не отвечает больше 6 секунд. Обычно это значит, что разрешение на камеру для сайта заблокировано на уровне телефона/браузера. Проверьте значок замка слева от адреса → Разрешения → Камера → Разрешить, затем перезагрузите страницу. Можно ввести номер карты вручную.');
    }
  }, 6000);

  try {
    // Мгновенная проверка текущего статуса разрешения, если браузер это поддерживает (не работает в iOS Safari — там просто пропустим)
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'camera' }).then(function (perm) {
        if (perm.state === 'denied') {
          clearTimeout(state.startTimeout);
          failScan('Доступ к камере заблокирован для этого сайта. Нажмите на значок замка слева от адреса → Разрешения → Камера → Разрешить, затем перезагрузите страницу.');
        }
      }).catch(function () { /* API недоступен на этом браузере — просто продолжаем обычным путём */ });
    }

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(function (stream) {
      state.stream = stream;
      video.srcObject = stream;
      video.setAttribute('playsinline', 'true');
      return video.play().catch(function () {}); // play может вернуть отклонённый промис на части браузеров — не критично
    }).then(function () {
      clearTimeout(state.startTimeout);
      state.starting = false;
      state.scanning = true;
      stage.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Остановить камеру';
      scanStatus('Наведите на QR-код');
      beginDetectLoop(video);
    }).catch(function (err) {
      clearTimeout(state.startTimeout);
      failScan(describeCamError(err));
    });
  } catch (syncErr) {
    clearTimeout(state.startTimeout);
    failScan('Внутренняя ошибка запуска камеры: ' + (syncErr && syncErr.message ? syncErr.message : syncErr) + '. Введите номер карты вручную.');
  }
}

function beginDetectLoop(video) {
  // Вариант A: нативный BarcodeDetector (Chrome на Android)
  if ('BarcodeDetector' in window) {
    var detector;
    try { detector = new window.BarcodeDetector({ formats: ['qr_code'] }); }
    catch (e) { detector = null; }
    if (detector) {
      var tick = function () {
        if (!state.scanning) return;
        detector.detect(video).then(function (codes) {
          if (codes && codes.length) { onScan(codes[0].rawValue); return; }
          state.rafId = requestAnimationFrame(tick);
        }).catch(function () {
          state.rafId = requestAnimationFrame(tick);
        });
      };
      state.rafId = requestAnimationFrame(tick);
      return;
    }
  }
  // Вариант B: резервный jsQR через canvas
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d', { willReadFrequently: true });
  loadJsQR().then(function (jsQR) {
    var tick = function () {
      if (!state.scanning) return;
      if (video.readyState >= 2 && video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data) { onScan(code.data); return; }
      }
      state.rafId = requestAnimationFrame(tick);
    };
    state.rafId = requestAnimationFrame(tick);
  }).catch(function () {
    scanStatus('Не удалось загрузить модуль распознавания. Введите номер карты вручную.', true);
  });
}

function describeCamError(err) {
  var name = (err && (err.name || err.toString())) || '';
  if (/NotAllowed|Permission|SecurityError/i.test(name)) return 'Доступ к камере запрещён. Нажмите на значок слева от адреса сайта → разрешите камеру → обновите страницу.';
  if (/NotFound|OverConstrained|Devices/i.test(name)) return 'Камера не найдена. Введите номер карты вручную.';
  if (/NotReadable|TrackStart|Abort/i.test(name)) return 'Камера занята другим приложением. Закройте его и попробуйте снова.';
  return 'Не удалось включить камеру: ' + name + '. Можно ввести номер вручную.';
}

function failScan(text) {
  cleanupCamera();
  state.starting = false;
  state.scanning = false;
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  if (stage) stage.classList.add('hidden');
  if (btn) { btn.disabled = false; btn.textContent = 'Включить камеру'; }
  scanStatus(text || 'Не удалось включить камеру.', true);
}

function cleanupCamera() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  if (state.startTimeout) { clearTimeout(state.startTimeout); state.startTimeout = null; }
  if (state.stream) {
    try { state.stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
    state.stream = null;
  }
  var video = document.getElementById('scan-video');
  if (video) { try { video.pause(); } catch (e) {} video.srcObject = null; }
}

function stopScanner() {
  cleanupCamera();
  state.scanning = false;
  state.starting = false;
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  if (stage) stage.classList.add('hidden');
  if (btn) { btn.disabled = false; btn.textContent = 'Включить камеру'; }
  scanStatus('');
}

function onScan(text) {
  stopScanner();
  var id = text; var m = String(text).match(/[?&]id=([^&]+)/); if (m) id = decodeURIComponent(m[1]);
  var inp = document.getElementById('scan-manual'); if (inp) inp.value = id;
  lookupCard(id);
}

function lookupCard(id) {
  apiGet('getCardInfo', { id: id }).then(renderScanResult);
}

function renderScanResult(card) {
  var box = document.getElementById('scan-result');
  if (!box) return;
  if (!card.found) {
    box.innerHTML = '<div class="card"><h2>Карта ' + esc(card.id) + '</h2>' +
      '<p class="msg err">Эта карта не найдена в базе.</p>' +
      '<button class="btn-secondary" style="width:100%;margin-top:12px;" onclick="prefillNewFrom(\'' + esc(card.id) + '\')">Создать карту с этим номером</button></div>';
    return;
  }
  var tel = card.phone ? '<a class="tel" href="tel:' + esc(card.phone) + '">' + esc(card.phone) + '</a>' : '—';
  var daysNote = '';
  if (card.status === 'soon') daysNote = ' · осталось ' + card.daysLeft + ' дн.';
  box.innerHTML =
    '<div class="card">' +
      '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<h2>' + esc(card.name || 'Без имени') + '</h2>' +
        '<span class="badge s-' + card.status + '">' + STATUS_LABEL[card.status] + '</span>' +
      '</div>' +
      '<p class="cid" style="font-family:ui-monospace,monospace; color:var(--muted); font-size:12px; margin:2px 0 0;">' + esc(card.id) + '</p>' +
      '<dl class="kv">' +
        '<dt>Телефон</dt><dd>' + tel + '</dd>' +
        '<dt>Действует до</dt><dd>' + (card.endDate ? esc(card.endDate) + daysNote : '—') + '</dd>' +
        (card.notes ? '<dt>Заметки</dt><dd style="font-weight:400;">' + esc(card.notes) + '</dd>' : '') +
      '</dl>' +
      '<label>Продлить подписку на</label>' +
      '<select id="rn-months"><option value="1">1 месяц</option><option value="3">3 месяца</option><option value="6">6 месяцев</option><option value="12">12 месяцев</option></select>' +
      '<div class="row-btns" style="margin-top:12px;">' +
        '<button class="btn-primary" style="margin:0;" onclick="doRenew(\'' + esc(card.id) + '\')">Продлить</button>' +
        '<button class="btn-ghost" onclick="showQrModal(\'' + esc(card.id) + '\')">Показать QR</button>' +
      '</div>' +
    '</div>';
  state.lastCard = card.id;
}

function doRenew(id) {
  var months = document.getElementById('rn-months').value;
  apiPost('renewSubscription', { username: state.user.username, cardId: id, months: months }).then(function (res) {
    if (res.success) { toast('Продлено до ' + res.card.endDate); renderScanResult(res.card); }
    else alert(res.error);
  });
}

      '<div class="stat"><div class="n">' + s.total + '</div><div class="l">Всего</div></div>' +

      '<div class="stat e"><div class="n">' + s.expired + '</div><div class="l">Истекли</div></div>';
  });

function refreshList() {
  var qEl = document.getElementById('ls-search');
  var q = qEl ? qEl.value : '';
  apiGet('listCards', { q: q }).then(function (cards) {
    var body = document.getElementById('ls-body'); if (!body) return;

    body.innerHTML = '';
    cards.forEach(function (c) {
      var div = document.createElement('div');
      div.className = 'citem';
      var meta = [];
      if (c.phone) meta.push(esc(c.phone));
      if (c.endDate) meta.push('до ' + esc(c.endDate));
      div.innerHTML =
        '<div class="who">' +
          '<div class="nm">' + esc(c.name || 'Без имени') + '</div>' +
          '<div class="meta">' + meta.join(' · ') + '</div>' +
          '<div class="cid">' + esc(c.id) + '</div>' +
        '</div>' +
        '<div class="right">' +
          '<span class="badge s-' + c.status + '">' + STATUS_LABEL[c.status] + '</span>' +
          '<div style="display:flex; gap:6px;">' +
            '<span class="icon-btn" title="QR-код" data-qr="' + esc(c.id) + '">' + ICON.qr + '</span>' +
            '<span class="icon-btn" title="Изменить" data-edit="' + esc(c.id) + '">' + ICON.edit + '</span>' +
            '<span class="icon-btn" title="Удалить" data-del="' + esc(c.id) + '" style="color:var(--red);">' + ICON.trash + '</span>' +

      div.querySelector('[data-del]').onclick = function () { confirmDeleteCard(c); };
      body.appendChild(div);

function confirmDeleteCard(c) {

    '<p class="sub">' + esc(c.name || 'Без имени') + ' · ' + esc(c.id) + '<br>Действие необратимо.</p>' +

function showQrModal(id) {
  openModal(
    '<button class="modal-x" onclick="closeModal()">✕</button>' +
    '<h2>Наклейка на карту</h2>' +
    '<p class="sub" style="margin-bottom:14px;">Размер — стандартная банковская карта (85.6 × 54 мм). Печатается точно в размер.</p>' +
    '<div style="display:flex; justify-content:center; padding:8px 0 4px;">' + cardStickerHtml(id) + '</div>' +
    '<button class="btn-primary no-print" onclick="printCards([\'' + esc(id) + '\'])">Распечатать наклейку</button>' +
    '<p class="sheet-hint no-print">В диалоге печати выберите масштаб «100% / Фактический размер» — не «По размеру страницы», иначе размер съедет.</p>'
  );
}

// ============================ ВКЛАДКА: НОВАЯ КАРТА ============================
function viewNew(v) {
  v.innerHTML =
    '<div class="card">' +
      '<h2>Новая карта</h2>' +
      '<p class="sub">Оформите карту сразу на клиента и распечатайте QR.</p>' +
      '<label>Номер карты</label>' +
      '<div style="display:flex; gap:8px;">' +
        '<input id="nw-id" placeholder="Сгенерируйте номер" style="flex:1;">' +
        '<button class="btn-secondary" id="nw-gen" style="white-space:nowrap;">Сгенерировать</button>' +
      '</div>' +
      '<label>Имя клиента</label><input id="nw-name">' +
      '<label>Телефон</label><input id="nw-phone" inputmode="tel" placeholder="+7…">' +
      '<label>Срок подписки</label>' +
      '<select id="nw-months"><option value="1">1 месяц</option><option value="3">3 месяца</option><option value="6">6 месяцев</option><option value="12">12 месяцев</option></select>' +
      '<label>Заметки</label><input id="nw-notes">' +
      '<button class="btn-primary" id="nw-create">Создать карту</button>' +
      '<div id="nw-msg" class="msg"></div>' +
      '<div id="nw-done" class="hidden" style="text-align:center; margin-top:20px; border-top:1px solid var(--line); padding-top:18px;"></div>' +
    '</div>';
  document.getElementById('nw-gen').onclick = function () {
    apiGet('generateCardId', {}).then(function (id) { document.getElementById('nw-id').value = id; });
  };
  document.getElementById('nw-create').onclick = function () {
    var id = document.getElementById('nw-id').value.trim();
    var msg = document.getElementById('nw-msg');
    if (!id) { msg.className = 'msg err'; msg.textContent = 'Укажите или сгенерируйте номер карты'; return; }
    apiPost('createCard', {
      username: state.user.username, cardId: id,
      name: document.getElementById('nw-name').value,
      phone: document.getElementById('nw-phone').value,
      months: document.getElementById('nw-months').value,
      notes: document.getElementById('nw-notes').value
    }).then(function (res) {
      if (!res.success) { msg.className = 'msg err'; msg.textContent = res.error; return; }
      msg.textContent = '';
      var done = document.getElementById('nw-done');
      done.classList.remove('hidden');
      done.innerHTML =
        '<p style="font-weight:700; margin:0 0 12px;">Карта создана</p>' +
        '<div style="display:flex; justify-content:center;">' + cardStickerHtml(res.card.id) + '</div>' +
        '<div class="row-btns" style="margin-top:14px;"><button class="btn-secondary" onclick="printCards([\'' + esc(res.card.id) + '\'])">Распечатать наклейку</button>' +
        '<button class="btn-ghost" onclick="go(\'new\')">Ещё одна</button></div>';
    });
  };
}

// ============================ ВКЛАДКА: ПЕЧАТЬ QR ПАКЕТОМ ============================
function viewPrint(v) {
  v.innerHTML =
    '<div class="card no-print">' +
      '<h2>Печать наклеек на карты</h2>' +
      '<p class="sub">Создаёт новые номера карт («ожидает выдачи») и готовит лист наклеек 85.6×54мм — точно под болванку. Имя клиента впишете при выдаче карты.</p>' +
      '<label>Сколько карт (по 2 в ряд на листе А4)</label><input id="pr-count" type="number" value="10" min="1" max="40">' +
      '<button class="btn-primary" id="pr-gen">Сгенерировать наклейки</button>' +
      '<p class="sub" style="margin:14px 0 0;">Уже созданные карты можно распечатать в любой момент из вкладки «Карты» — у каждой есть кнопка с QR.</p>' +
    '</div>' +
    '<div class="card hidden" id="pr-preview-card">' +
      '<h2>Предпросмотр листа</h2>' +
      '<p class="sheet-hint no-print" style="margin:0 0 14px;">Печатайте на самоклеящейся бумаге. В диалоге печати обязательно выберите масштаб «100% / Фактический размер» (НЕ «По размеру страницы») — иначе наклейки выйдут не в размер карты.</p>' +
      '<div class="sheet" id="pr-grid" style="justify-content:flex-start;"></div>' +
      '<button class="btn-secondary no-print" id="pr-print" style="width:100%; margin-top:16px;">Распечатать лист</button>' +
    '</div>';
  document.getElementById('pr-gen').onclick = function () {
    var count = parseInt(document.getElementById('pr-count').value, 10) || 1;
    apiPost('reserveNewCardIds', { count: count }).then(function (ids) {
      state.lastBatchIds = ids || [];
      var grid = document.getElementById('pr-grid');
      grid.innerHTML = state.lastBatchIds.map(cardStickerHtml).join('');
      document.getElementById('pr-preview-card').classList.remove('hidden');
    });
  };
  document.getElementById('pr-print').onclick = function () {
    printCards(state.lastBatchIds || []);
  };
}

// ============================ ВКЛАДКА: СОТРУДНИКИ (только админ) ============================
function viewStaff(v) {
  v.innerHTML =
    '<div class="card">' +
      '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">' +
        '<h2 style="margin:0;">Сотрудники</h2>' +
        '<button class="btn-secondary btn-sm" onclick="showUserModal(null)">+ Добавить</button>' +
      '</div>' +
      '<div class="clist" id="st-body"><p class="sub">Загрузка…</p></div>' +
    '</div>';
  refreshStaff();
}

function refreshStaff() {
  apiGet('listUsers', {}).then(function (users) {
    var body = document.getElementById('st-body'); if (!body) return;
    body.innerHTML = '';
    (users || []).forEach(function (usr) {
      var div = document.createElement('div');
      div.className = 'citem';
      var roleBadge = usr.role === 'admin'
        ? '<span class="badge s-active">Админ</span>'
        : '<span class="badge s-no_data">Кассир</span>';
      var isMe = usr.login.toLowerCase() === state.user.username.toLowerCase();
      div.innerHTML =
        '<div class="who"><div class="nm">' + esc(usr.fullName) + (isMe ? ' <span style="color:var(--muted); font-weight:400;">(вы)</span>' : '') + '</div>' +
          '<div class="meta">логин: ' + esc(usr.login) + '</div></div>' +
        '<div class="right">' + roleBadge +
          '<div style="display:flex; gap:6px;">' +
            '<span class="icon-btn" data-edit>' + ICON.edit + '</span>' +
            (isMe ? '' : '<span class="icon-btn" data-del style="color:var(--red);">' + ICON.trash + '</span>') +
          '</div></div>';
      div.querySelector('[data-edit]').onclick = function () { showUserModal(usr); };
      var del = div.querySelector('[data-del]');
      if (del) del.onclick = function () { confirmDeleteUser(usr); };
      body.appendChild(div);
    });
  });
}

function showUserModal(usr) {
  var isNew = !usr;
  openModal(
    '<button class="modal-x" onclick="closeModal()">✕</button>' +
    '<h2>' + (isNew ? 'Новый сотрудник' : 'Изменить сотрудника') + '</h2>' +
    '<label>Имя сотрудника</label><input id="us-name" value="' + (isNew ? '' : esc(usr.fullName)) + '">' +
    '<label>Логин</label><input id="us-login" value="' + (isNew ? '' : esc(usr.login)) + '" autocomplete="off">' +
    '<label>Пароль' + (isNew ? '' : ' (оставьте пустым, чтобы не менять)') + '</label><input id="us-pass" type="password" autocomplete="new-password">' +
    '<label>Роль</label><select id="us-role">' +
      '<option value="cashier"' + (!isNew && usr.role === 'cashier' ? ' selected' : '') + '>Кассир</option>' +
      '<option value="admin"' + (!isNew && usr.role === 'admin' ? ' selected' : '') + '>Администратор</option>' +
    '</select>' +
    '<button class="btn-primary" id="us-save">' + (isNew ? 'Создать' : 'Сохранить') + '</button>' +
    '<div id="us-msg" class="msg"></div>'
  );
  document.getElementById('us-save').onclick = function () {
    var payload = {
      actorRole: state.user.role,
      login: document.getElementById('us-login').value.trim(),
      password: document.getElementById('us-pass').value,
      role: document.getElementById('us-role').value,
      fullName: document.getElementById('us-name').value.trim()
    };
    var req;
    if (isNew) req = apiPost('addUser', payload);
    else { payload.origLogin = usr.login; req = apiPost('updateUser', payload); }
    req.then(function (res) {
      if (res.success) { closeModal(); toast('Сохранено'); refreshStaff(); }
      else { var m = document.getElementById('us-msg'); m.className = 'msg err'; m.textContent = res.error; }
    });
  };
}

function confirmDeleteUser(usr) {
  openModal(
    '<h2>Удалить сотрудника?</h2>' +
    '<p class="sub">' + esc(usr.fullName) + ' (' + esc(usr.login) + ')</p>' +
    '<div class="row-btns" style="margin-top:16px;">' +
      '<button class="btn-ghost" onclick="closeModal()">Отмена</button>' +
      '<button class="btn-danger" id="du-btn">Удалить</button>' +
    '</div>'
  );
  document.getElementById('du-btn').onclick = function () {
    apiPost('deleteUser', { actorRole: state.user.role, actorLogin: state.user.username, login: usr.login }).then(function (res) {
      closeModal();
      if (res.success) { toast('Сотрудник удалён'); refreshStaff(); }
      else alert(res.error);
    });
  };
}

// ============================ ВКЛАДКА: ЕЩЁ (пароль, экспорт) ============================
function viewSettings(v) {
  var adminExtra = state.user.role === 'admin'
    ? '<div class="card"><h2>Данные</h2><p class="sub">Скачать все карты в CSV (открывается в Excel).</p>' +
      '<button class="btn-ghost" style="width:100%;" onclick="exportCsv()">Скачать CSV</button></div>'
    : '';
  v.innerHTML =
    '<div class="card">' +
      '<h2>Сменить пароль</h2>' +
      '<label>Текущий пароль</label><input id="pw-old" type="password" autocomplete="current-password">' +
      '<label>Новый пароль</label><input id="pw-new" type="password" autocomplete="new-password">' +
      '<button class="btn-primary" id="pw-save">Сменить пароль</button>' +
      '<div id="pw-msg" class="msg"></div>' +
    '</div>' + adminExtra +
    '<div class="card"><h2>Как выдавать карты клиентам</h2>' +
    '<p class="sub" style="margin:0;">Клиент может сам навести камеру телефона на QR своей карты — откроется страница со статусом подписки и датой окончания, без каких-либо данных других клиентов.</p></div>';
  document.getElementById('pw-save').onclick = function () {
    var msg = document.getElementById('pw-msg');
    apiPost('changePassword', {
      username: state.user.username,
      oldPassword: document.getElementById('pw-old').value,
      newPassword: document.getElementById('pw-new').value
    }).then(function (res) {
      if (res.success) { msg.className = 'msg ok'; msg.textContent = 'Пароль изменён.'; document.getElementById('pw-old').value=''; document.getElementById('pw-new').value=''; }
      else { msg.className = 'msg err'; msg.textContent = res.error; }
    });
  };
}

function exportCsv() {
  window.open(API_BASE_URL + '?action=exportCsv', '_blank');
}

// ============================ УТИЛИТЫ ============================
function openModal(html) {
  closeModal();
  var ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'overlay';
  ov.innerHTML = '<div class="modal">' + html + '</div>';
  ov.addEventListener('click', function (e) { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { var ov = document.getElementById('overlay'); if (ov) ov.remove(); }

function toast(text) {
  var t = document.createElement('div');
  t.textContent = text;
  t.style.cssText = 'position:fixed; left:50%; bottom:78px; transform:translateX(-50%); background:var(--brand-dark); color:#fff; padding:11px 18px; border-radius:100px; font-size:14px; font-weight:600; z-index:80; box-shadow:0 6px 20px rgba(0,0,0,.2);';
  document.body.appendChild(t);
  setTimeout(function () { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 300); }, 1800);
}

function debounce(fn, ms) {
  var timer;
  return function () { clearTimeout(timer); timer = setTimeout(fn, ms); };
}
