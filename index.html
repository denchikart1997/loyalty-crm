<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Карты лояльности</title>
<style>
  :root {
    --bg: #f3f7f0; --surface: #ffffff; --ink: #16261b; --muted: #6b7c70; --line: #e2ebdd;
    --brand: #2f8f4e; --brand-dark: #24713e; --brand-soft: #e7f4ea;
    --amber: #c9821b; --amber-soft: #fdf1dd; --red: #c8402f; --red-soft: #fbe8e5;
    --radius: 14px; --shadow: 0 1px 2px rgba(20,40,25,.05), 0 6px 20px rgba(20,40,25,.04);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.45; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px 16px 96px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.02em; }
  h2 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; }
  h3 { font-size: 12px; margin: 0 0 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 16px; }
  label { display: block; font-size: 12.5px; color: var(--muted); margin: 12px 0 5px; font-weight: 600; }
  input, select { width: 100%; padding: 12px 13px; border: 1px solid var(--line); border-radius: 10px; font-size: 15px; background: #fff; color: var(--ink); font-family: var(--font); transition: border-color .15s, box-shadow .15s; }
  input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  button { cursor: pointer; border: none; border-radius: 10px; padding: 12px 16px; font-size: 15px; font-weight: 600; font-family: var(--font); transition: transform .05s, background .15s, opacity .15s; }
  button:active { transform: scale(.98); }
  .btn-primary { background: var(--brand); color: #fff; width: 100%; margin-top: 16px; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-secondary { background: var(--brand-soft); color: var(--brand-dark); }
  .btn-ghost { background: #f1f4ef; color: var(--ink); }
  .btn-danger { background: var(--red-soft); color: var(--red); }
  .btn-sm { padding: 8px 12px; font-size: 13px; border-radius: 8px; }
  .row-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .row-btns > button { flex: 1; min-width: 110px; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.err { color: var(--red); } .msg.ok { color: var(--brand-dark); }
  .hidden { display: none !important; }
  .banner { background: var(--amber-soft); border: 1px solid #f2dcae; color: #7a5310; font-size: 13px; padding: 11px 13px; border-radius: 10px; margin-bottom: 14px; }
  .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
  .brandmark { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .brandmark .leaf { width: 26px; height: 26px; flex: none; }
  .whoami { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.3; }
  .whoami b { color: var(--ink); display: block; font-size: 13px; }
  .link-btn { background: none; color: var(--muted); font-weight: 500; font-size: 12.5px; padding: 4px 0; }
  .tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; display: flex; background: rgba(255,255,255,.94); backdrop-filter: blur(8px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; text-align: center; padding: 9px 2px 10px; font-size: 11px; color: var(--muted); background: none; border-radius: 0; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab svg { width: 21px; height: 21px; }
  .tab.active { color: var(--brand); }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 100px; font-size: 12.5px; font-weight: 700; }
  .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .s-active { background: var(--brand-soft); color: var(--brand-dark); }
  .s-soon { background: var(--amber-soft); color: var(--amber); }
  .s-expired { background: var(--red-soft); color: var(--red); }
  .s-no_data { background: #eef1ec; color: var(--muted); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 6px; text-align: center; }
  .stat .n { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .stat .l { font-size: 10.5px; color: var(--muted); margin-top: 2px; font-weight: 600; }
  .stat.a .n { color: var(--brand-dark); } .stat.w .n { color: var(--amber); } .stat.e .n { color: var(--red); }
  .clist { display: flex; flex-direction: column; gap: 10px; }
  .citem { border: 1px solid var(--line); border-radius: 12px; padding: 13px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .citem .who { min-width: 0; }
  .citem .nm { font-weight: 700; font-size: 15px; }
  .citem .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .citem .cid { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: var(--muted); }
  .citem .right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex: none; }
  .icon-btn { background: #f1f4ef; border-radius: 8px; padding: 7px; display: inline-flex; cursor: pointer; }
  .icon-btn svg { width: 16px; height: 16px; display: block; }
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 8px 16px; font-size: 14px; margin: 14px 0; }
  .kv dt { color: var(--muted); } .kv dd { margin: 0; font-weight: 600; }
  .kv a.tel { color: var(--brand-dark); text-decoration: none; }
  #scan-stage { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #0d1a12; margin-bottom: 4px; }
  #scan-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #scan-stage::after { content: ''; position: absolute; inset: 18%; border: 3px solid rgba(255,255,255,.85); border-radius: 16px; box-shadow: 0 0 0 100vmax rgba(0,0,0,.25); pointer-events: none; }
  .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 14px; }
  .qr-cell { text-align: center; border: 1px dashed var(--line); border-radius: 10px; padding: 10px; background: #fff; }
  .qr-cell img, .qr-cell svg { width: 100%; height: auto; }
  .qr-cell .cap { font-size: 11px; margin-top: 5px; font-family: ui-monospace, monospace; color: var(--muted); }
  .overlay { position: fixed; inset: 0; background: rgba(15,25,18,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #fff; border-radius: 16px; padding: 22px; max-width: 380px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
  .modal-x { float: right; background: #f1f4ef; border-radius: 8px; width: 30px; height: 30px; padding: 0; font-size: 18px; line-height: 1; color: var(--muted); }
  .public-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .public-card { max-width: 360px; width: 100%; background: var(--surface); border-radius: 20px; padding: 32px 26px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--line); }
  .public-card .leaf { width: 40px; height: 40px; margin: 0 auto 14px; display: block; }
  .public-status-icon { width: 72px; height: 72px; margin: 6px auto 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .public-status-icon svg { width: 40px; height: 40px; }
  .pi-active { background: var(--brand-soft); color: var(--brand-dark); }
  .pi-soon { background: var(--amber-soft); color: var(--amber); }
  .pi-expired { background: var(--red-soft); color: var(--red); }
  .public-card .big { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
  .public-card .date { font-size: 15px; color: var(--muted); }
  .public-card .date b { color: var(--ink); }
  .public-foot { margin-top: 22px; font-size: 12px; color: var(--muted); }
  /* Наклейка под физический размер карты (85.6 × 54 мм — стандарт банковской карты) */
  .pcard { width: 85.6mm; height: 54mm; box-sizing: border-box; padding: 3mm; border: 0.3mm dashed #aaa; border-radius: 2mm; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.8mm; background: #fff; page-break-inside: avoid; break-inside: avoid; }
  .pcard-head { display: flex; align-items: center; gap: 1.3mm; font-weight: 700; font-size: 9.5px; color: var(--ink); text-align: center; }
  .pcard-head svg { width: 10px; height: 10px; flex: none; }
  .pcard-qr { width: 28mm; height: 28mm; }
  .pcard-qr .qr-slot, .pcard-qr img, .pcard-qr svg { width: 100%; height: 100%; display: block; }
  .pcard-id { font-family: ui-monospace, Menlo, monospace; font-size: 8.5px; color: #666; letter-spacing: .02em; }
  .sheet { display: grid; grid-template-columns: repeat(2, 85.6mm); gap: 4mm; justify-content: center; }
  .sheet-hint { font-size: 12px; color: var(--muted); margin: 10px 0 0; }
  #print-sheet { display: none; }
  @media print {
    @page { size: A4; margin: 10mm; }
    body.printing #print-sheet { display: block !important; }
    body.printing .topbar, body.printing .tabs, body.printing .wrap, body.printing .overlay { display: none !important; }
  }
  @media print { .topbar, .tabs, .no-print { display: none !important; } .wrap { padding: 0; max-width: 100%; } .card { box-shadow: none; border: none; } .qr-grid { grid-template-columns: repeat(3, 1fr); } }

  /* Наклейка с загруженным фоном: фон на всю карту, QR позиционируется поверх по заданным координатам */
  .pcard.has-bg { padding: 0; border: none; display: block; background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; overflow: hidden; }
  .pcard.has-bg .pcard-qr { position: absolute; width: auto; height: auto; }
  .pcard.has-bg .pcard-qr .qr-slot, .pcard.has-bg .pcard-qr img, .pcard.has-bg .pcard-qr svg { width: 100%; height: 100%; display: block; }
  .bg-preview-wrap { display: flex; justify-content: center; margin: 4px 0 6px; }
  .bg-preview-wrap .pcard { transform: scale(1.35); transform-origin: center; margin: 20px 0; }

  /* Индикатор загрузки внутри кнопок — чтобы было видно, что система работает, а не зависла */
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.45); border-top-color: #fff; border-radius: 50%; animation: sp-rotate .6s linear infinite; margin-right: 7px; vertical-align: -2px; }
  .btn-secondary .spinner, .btn-ghost .spinner { border-color: rgba(47,143,78,.25); border-top-color: var(--brand-dark); }
  @keyframes sp-rotate { to { transform: rotate(360deg); } }

  /* Skeleton-заглушки на время первой загрузки списков */
  .skel { background: linear-gradient(100deg, #eef1ec 30%, #e3e9df 45%, #eef1ec 60%); background-size: 250% 100%; animation: sk-shimmer 1.3s ease-in-out infinite; border-radius: 8px; }
  @keyframes sk-shimmer { 0% { background-position: 140% 0; } 100% { background-position: -40% 0; } }
  .skel-stat { height: 58px; border-radius: 12px; }
  .skel-row { height: 64px; border-radius: 12px; margin-bottom: 10px; }

  /* Плавное исчезновение элемента списка при удалении — без ожидания перезагрузки всего списка */
  .citem.removing { opacity: 0; transform: scale(.96); pointer-events: none; }
  .citem { transition: opacity .18s ease, transform .18s ease; }
</style>
</head>
<body>
<div id="root"></div>
<div id="print-sheet"></div>
<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/

// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php

// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html

//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = new Array();

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw new Error('code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')');
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :

// Работает полностью офлайн: ни один QR-код больше не грузится с внешнего сервиса, поэтому качество связи в магазине ни на что не влияет.

function makeQrCode(text) {
  for (var t = 1; t <= 40; t += 1) {
    try {
      var qr = qrcode(t, 'M');
      qr.addData(String(text));
      qr.make();
      return qr;
    } catch (e) { /* версия мала для этого текста — пробуем следующую */ }
  }
  throw new Error('Слишком длинный текст для QR-кода');
}

/** SVG-разметка QR: viewBox подстраивает картинку под контейнер через CSS, печатается чётко на любом размере */
function qrSvgMarkup(text) {

  var raw = qr.createSvgTag(4); // margin по умолчанию = 4×cellSize — стандартная «тихая зона» вокруг QR

  return raw.replace(/width="\d+px" height="\d+px"/, 'viewBox="0 0 ' + size + ' ' + size + '" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"');

var CARD_W_MM = 85.6, CARD_H_MM = 54;

/** Считает реальные мм-координаты QR по проценту и гарантирует, что QR никогда не вылезет за границы карты:

 * позицию дополнительно подрезаем, если размер+смещение всё равно не влезает. */
function clampQrGeometry(x, y, size) {
  x = Number(x) || 0; y = Number(y) || 0; size = Number(size) || 40;
  if (size < 10) size = 10;
  if (size > 95) size = 95;
  var szMm = size / 100 * CARD_H_MM;
  var xMaxPct = Math.max(0, (CARD_W_MM - szMm) / CARD_W_MM * 100);
  var yMaxPct = Math.max(0, (CARD_H_MM - szMm) / CARD_H_MM * 100);
  if (x < 0) x = 0;
  if (y < 0) y = 0;
  if (x > xMaxPct) x = xMaxPct;
  if (y > yMaxPct) y = yMaxPct;
  return {
    xMm: (x / 100 * CARD_W_MM).toFixed(2),
    yMm: (y / 100 * CARD_H_MM).toFixed(2),
    szMm: szMm.toFixed(2)
  };
}

function renderPublic(cardId) {

    } else {
      body.innerHTML = '<div class="public-status-icon pi-active">' + ICON.check + '</div>' +
        '<p class="big">Подписка активна</p>' +
        '<p class="date">Действует до <b>' + esc(res.endDate) + '</b></p>';
    }
  }).catch(function () {
    document.getElementById('pubBody').innerHTML = '<p class="date">Не удалось проверить карту. Попробуйте позже.</p>';

function renderLogin() {
  var warn = (!API_BASE_URL || API_BASE_URL.indexOf('ВСТАВЬТЕ') !== -1)
    ? '<div class="banner">Не указан адрес API. Откройте index.html и впишите ссылку Apps Script (/exec) в переменную API_BASE_URL.</div>' : '';
  root.innerHTML =
    '<div class="wrap" style="padding-top:56px; max-width:420px;">' +
      '<div class="card">' +
        '<div class="brandmark" style="margin-bottom:18px; font-size:18px;">' + ICON.leaf + 'Карты лояльности</div>' +
        warn +
        '<p class="sub">Вход для сотрудников магазина</p>' +
        '<label>Логин</label><input id="lg-user" autocomplete="username">' +
        '<label>Пароль</label><input id="lg-pass" type="password" autocomplete="current-password">' +
        '<button class="btn-primary" id="lg-btn">Войти</button>' +
        '<div id="lg-msg" class="msg err hidden"></div>' +
      '</div>' +
    '</div>';
  document.getElementById('lg-btn').onclick = doLogin;
  document.getElementById('lg-pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
}

function doLogin() {
  var u = document.getElementById('lg-user').value.trim();
  var p = document.getElementById('lg-pass').value;
  var msg = document.getElementById('lg-msg');
  msg.classList.add('hidden');
  if (!u || !p) return;
  var btn = document.getElementById('lg-btn');
  btn.textContent = 'Входим…'; btn.disabled = true;
  apiPost('authenticate', { username: u, password: p }).then(function (res) {
    btn.textContent = 'Войти'; btn.disabled = false;
    if (res.success) {
      state.user = { username: u, role: res.role, fullName: res.fullName };
      sessionStorage.setItem('crmUser', JSON.stringify(state.user));
      renderApp(null);
    } else { msg.textContent = res.error || 'Ошибка входа'; msg.classList.remove('hidden'); }
  }).catch(function (e) {
    btn.textContent = 'Войти'; btn.disabled = false;
    msg.textContent = 'Нет связи с сервером: ' + e.message; msg.classList.remove('hidden');
  });
}

function doLogout() {
  stopScanner();
  state.user = null;
  sessionStorage.removeItem('crmUser');
  // убираем ?id из адреса, чтобы после выхода не улететь на публичную страницу
  history.replaceState(null, '', baseUrl());
  renderLogin();
}

// ============================ КАРКАС ПРИЛОЖЕНИЯ ============================
function renderApp(prefillCardId) {
  var u = state.user;
  var roleLabel = u.role === 'admin' ? 'Администратор' : 'Кассир';
  root.innerHTML =
    '<div class="topbar">' +
      '<div class="brandmark">' + ICON.leaf + 'Лояльность</div>' +
      '<div style="display:flex; align-items:center; gap:14px;">' +
        '<div class="whoami"><b>' + esc(u.fullName) + '</b>' + roleLabel + '</div>' +
        '<button class="link-btn" id="tb-logout">Выйти</button>' +
      '</div>' +
    '</div>' +
    '<div class="wrap" id="view"></div>' +
    '<nav class="tabs" id="tabs"></nav>';

  document.getElementById('tb-logout').onclick = doLogout;

  var tabs = [{ id: 'scan', label: 'Сканер', icon: ICON.scan }];
  tabs.push({ id: 'list', label: 'Карты', icon: ICON.list });
  tabs.push({ id: 'new', label: 'Новая', icon: ICON.plus });
  tabs.push({ id: 'print', label: 'Печать', icon: ICON.print });
  if (u.role === 'admin') tabs.push({ id: 'staff', label: 'Сотрудники', icon: ICON.people });
  tabs.push({ id: 'settings', label: 'Ещё', icon: ICON.gear });
  state.tabs = tabs;

  var nav = document.getElementById('tabs');
  tabs.forEach(function (t) {
    var b = document.createElement('button');
    b.className = 'tab'; b.id = 'tab-' + t.id;
    b.innerHTML = t.icon + '<span>' + t.label + '</span>';
    b.onclick = function () { go(t.id); };
    nav.appendChild(b);
  });

  if (prefillCardId) { go('scan'); setTimeout(function () { lookupCard(prefillCardId); }, 60); }
  else go('scan');

  loadSettingsOnce();
}

/** Настройки (фон наклейки, позиция QR) грузятся один раз за сессию и кэшируются — наклейки нигде не ждут лишний запрос */
function loadSettingsOnce() {
  if (state.settings) return;
  apiGet('getSettings', {}).then(function (s) { state.settings = s || {}; }).catch(function () { state.settings = {}; });
}

function go(name) {
  if (name !== 'scan') stopScanner();
  state.tabs.forEach(function (t) {
    var el = document.getElementById('tab-' + t.id);
    if (el) el.classList.toggle('active', t.id === name);
  });
  var v = document.getElementById('view');
  if (name === 'scan') viewScan(v);
  else if (name === 'list') viewList(v);
  else if (name === 'new') viewNew(v);
  else if (name === 'print') viewPrint(v);
  else if (name === 'staff') viewStaff(v);
  else if (name === 'settings') viewSettings(v);
}

// ============================ ВКЛАДКА: СКАНЕР ============================
function viewScan(v) {
  v.innerHTML =
    '<div class="card">' +
      '<h2>Сканировать карту</h2>' +
      '<p class="sub">Наведите камеру на QR-код карты клиента.</p>' +
      '<div id="scan-stage" class="hidden"><video id="scan-video" playsinline muted></video></div>' +
      '<button class="btn-primary" id="scan-btn">Включить камеру</button>' +
      '<div id="scan-status" class="msg" style="text-align:center;"></div>' +
      '<label>Или введите номер карты вручную</label>' +
      '<div style="display:flex; gap:8px;">' +
        '<input id="scan-manual" placeholder="LC-000123" style="flex:1;">' +
        '<button class="btn-secondary" id="scan-find" style="white-space:nowrap;">Найти</button>' +
      '</div>' +
    '</div>' +
    '<div id="scan-result"></div>';
  document.getElementById('scan-btn').onclick = toggleScanner;
  document.getElementById('scan-find').onclick = function () {
    var id = document.getElementById('scan-manual').value.trim(); if (id) lookupCard(id);
  };
  document.getElementById('scan-manual').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { var id = this.value.trim(); if (id) lookupCard(id); }
  });
}

function scanStatus(text, isErr) {
  var el = document.getElementById('scan-status');
  if (!el) return;
  el.textContent = text || '';
  el.className = 'msg' + (isErr ? ' err' : '');
  el.classList.toggle('hidden', !text);
}

// Ленивая загрузка резервного декодера jsQR (только если нет нативного BarcodeDetector)
function loadJsQR() {
  if (window.jsQR) return Promise.resolve(window.jsQR);
  return new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = function () { resolve(window.jsQR); };
    s.onerror = function () { reject(new Error('jsQR load failed')); };
    document.head.appendChild(s);
  });
}

function toggleScanner() {
  if (state.scanning || state.starting) { stopScanner(); return; }
  startScanner();
}

function startScanner() {
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  var video = document.getElementById('scan-video');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    scanStatus('Этот браузер не поддерживает камеру. Откройте сайт в Chrome, либо введите номер карты вручную.', true);
    return;
  }

  state.starting = true;
  btn.textContent = 'Запуск камеры…';
  btn.disabled = true;
  scanStatus('Запрашиваем доступ к камере — если на телефоне появится системное окно, нажмите «Разрешить»…');

  // Страховочный таймаут: если за 6 сек камера не пошла — не виснем, а показываем ошибку
  state.startTimeout = setTimeout(function () {
    if (state.starting && !state.scanning) {
      failScan('Камера не отвечает больше 6 секунд. Обычно это значит, что разрешение на камеру для сайта заблокировано на уровне телефона/браузера. Проверьте значок замка слева от адреса → Разрешения → Камера → Разрешить, затем перезагрузите страницу. Можно ввести номер карты вручную.');
    }
  }, 6000);

  try {
    // Мгновенная проверка текущего статуса разрешения, если браузер это поддерживает (не работает в iOS Safari — там просто пропустим)
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'camera' }).then(function (perm) {
        if (perm.state === 'denied') {
          clearTimeout(state.startTimeout);
          failScan('Доступ к камере заблокирован для этого сайта. Нажмите на значок замка слева от адреса → Разрешения → Камера → Разрешить, затем перезагрузите страницу.');
        }
      }).catch(function () { /* API недоступен на этом браузере — просто продолжаем обычным путём */ });
    }

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(function (stream) {
      state.stream = stream;
      video.srcObject = stream;
      video.setAttribute('playsinline', 'true');
      return video.play().catch(function () {}); // play может вернуть отклонённый промис на части браузеров — не критично
    }).then(function () {
      clearTimeout(state.startTimeout);
      state.starting = false;
      state.scanning = true;
      stage.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Остановить камеру';
      scanStatus('Наведите на QR-код');
      beginDetectLoop(video);
    }).catch(function (err) {
      clearTimeout(state.startTimeout);
      failScan(describeCamError(err));
    });
  } catch (syncErr) {
    clearTimeout(state.startTimeout);
    failScan('Внутренняя ошибка запуска камеры: ' + (syncErr && syncErr.message ? syncErr.message : syncErr) + '. Введите номер карты вручную.');
  }
}

function beginDetectLoop(video) {
  // Вариант A: нативный BarcodeDetector (Chrome на Android)
  if ('BarcodeDetector' in window) {
    var detector;
    try { detector = new window.BarcodeDetector({ formats: ['qr_code'] }); }
    catch (e) { detector = null; }
    if (detector) {
      var tick = function () {
        if (!state.scanning) return;
        detector.detect(video).then(function (codes) {
          if (codes && codes.length) { onScan(codes[0].rawValue); return; }
          state.rafId = requestAnimationFrame(tick);
        }).catch(function () {
          state.rafId = requestAnimationFrame(tick);
        });
      };
      state.rafId = requestAnimationFrame(tick);
      return;
    }
  }
  // Вариант B: резервный jsQR через canvas
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d', { willReadFrequently: true });
  loadJsQR().then(function (jsQR) {
    var tick = function () {
      if (!state.scanning) return;
      if (video.readyState >= 2 && video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data) { onScan(code.data); return; }
      }
      state.rafId = requestAnimationFrame(tick);
    };
    state.rafId = requestAnimationFrame(tick);
  }).catch(function () {
    scanStatus('Не удалось загрузить модуль распознавания. Введите номер карты вручную.', true);
  });
}

function describeCamError(err) {
  var name = (err && (err.name || err.toString())) || '';
  if (/NotAllowed|Permission|SecurityError/i.test(name)) return 'Доступ к камере запрещён. Нажмите на значок слева от адреса сайта → разрешите камеру → обновите страницу.';
  if (/NotFound|OverConstrained|Devices/i.test(name)) return 'Камера не найдена. Введите номер карты вручную.';
  if (/NotReadable|TrackStart|Abort/i.test(name)) return 'Камера занята другим приложением. Закройте его и попробуйте снова.';
  return 'Не удалось включить камеру: ' + name + '. Можно ввести номер вручную.';
}

function failScan(text) {
  cleanupCamera();
  state.starting = false;
  state.scanning = false;
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  if (stage) stage.classList.add('hidden');
  if (btn) { btn.disabled = false; btn.textContent = 'Включить камеру'; }
  scanStatus(text || 'Не удалось включить камеру.', true);
}

function cleanupCamera() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  if (state.startTimeout) { clearTimeout(state.startTimeout); state.startTimeout = null; }
  if (state.stream) {
    try { state.stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
    state.stream = null;
  }
  var video = document.getElementById('scan-video');
  if (video) { try { video.pause(); } catch (e) {} video.srcObject = null; }
}

function stopScanner() {
  cleanupCamera();
  state.scanning = false;
  state.starting = false;
  var btn = document.getElementById('scan-btn');
  var stage = document.getElementById('scan-stage');
  if (stage) stage.classList.add('hidden');
  if (btn) { btn.disabled = false; btn.textContent = 'Включить камеру'; }
  scanStatus('');
}

function onScan(text) {
  stopScanner();
  var id = text; var m = String(text).match(/[?&]id=([^&]+)/); if (m) id = decodeURIComponent(m[1]);
  var inp = document.getElementById('scan-manual'); if (inp) inp.value = id;
  lookupCard(id);
}

function lookupCard(id) {
  apiGet('getCardInfo', { id: id }).then(renderScanResult);
}

function renderScanResult(card) {
  var box = document.getElementById('scan-result');
  if (!box) return;
  if (!card.found) {
    box.innerHTML = '<div class="card"><h2>Карта ' + esc(card.id) + '</h2>' +
      '<p class="msg err">Эта карта не найдена в базе.</p>' +
      '<button class="btn-secondary" style="width:100%;margin-top:12px;" onclick="prefillNewFrom(\'' + esc(card.id) + '\')">Создать карту с этим номером</button></div>';
    return;
  }
  // Карта существует в таблице, но подписка ещё не оформлена (партия распечатана заранее и лежит в коробке) — предлагаем выдать её клиенту
  if (!card.endDate) {
    box.innerHTML = renderActivateForm(card);
    wireActivateForm(card.id);
    return;
  }
  var tel = card.phone ? '<a class="tel" href="tel:' + esc(card.phone) + '">' + esc(card.phone) + '</a>' : '—';
  var daysNote = '';
  if (card.status === 'soon') daysNote = ' · осталось ' + card.daysLeft + ' дн.';
  box.innerHTML =
    '<div class="card">' +
      '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<h2>' + esc(card.name || 'Без имени') + '</h2>' +
        '<span class="badge s-' + card.status + '">' + STATUS_LABEL[card.status] + '</span>' +
      '</div>' +
      '<p class="cid" style="font-family:ui-monospace,monospace; color:var(--muted); font-size:12px; margin:2px 0 0;">' + esc(card.id) + '</p>' +
      '<dl class="kv">' +
        '<dt>Телефон</dt><dd>' + tel + '</dd>' +
        '<dt>Действует до</dt><dd>' + (card.endDate ? esc(card.endDate) + daysNote : '—') + '</dd>' +
        (card.notes ? '<dt>Заметки</dt><dd style="font-weight:400;">' + esc(card.notes) + '</dd>' : '') +
      '</dl>' +
      '<label>Продлить подписку на</label>' +
      '<select id="rn-months">' + monthOptionsHtml() + '</select>' +
      '<div class="row-btns" style="margin-top:12px;">' +
        '<button class="btn-primary" style="margin:0;" id="rn-btn" onclick="doRenew(\'' + esc(card.id) + '\')">Продлить</button>' +
        '<button class="btn-ghost" onclick="showQrModal(\'' + esc(card.id) + '\')">Показать QR</button>' +
      '</div>' +
    '</div>';
  state.lastCard = card.id;
}

function doRenew(id) {
  var btn = document.getElementById('rn-btn');
  var months = document.getElementById('rn-months').value;
  setBtnLoading(btn, 'Продлеваем…');
  apiPost('renewSubscription', { username: state.user.username, cardId: id, months: months }).then(function (res) {
    if (res.success) { toast('Продлено до ' + res.card.endDate); renderScanResult(res.card); }
    else { clearBtnLoading(btn); alert(res.error); }
  }).catch(function () { clearBtnLoading(btn); });
}

/** Форма выдачи заранее напечатанной карты конкретному клиенту — появляется автоматически при сканировании ещё не оформленной карты */
function renderActivateForm(card) {
  return '<div class="card">' +
    '<div style="display:flex; justify-content:space-between; align-items:center;">' +
      '<h2>Новая карта из коробки</h2>' +
      '<span class="badge s-no_data">Не выдана</span>' +
    '</div>' +
    '<p class="cid" style="font-family:ui-monospace,monospace; color:var(--muted); font-size:12px; margin:2px 0 0;">' + esc(card.id) + '</p>' +
    '<p class="sub" style="margin-top:10px;">Эта карта уже напечатана, но ещё не привязана к клиенту. Заполните данные, чтобы выдать её сейчас.</p>' +
    '<label>Имя клиента</label><input id="ac-name">' +
    '<label>Телефон</label><input id="ac-phone" inputmode="tel" placeholder="+7…">' +
    '<label>Срок подписки</label>' +
    '<select id="ac-months">' + monthOptionsHtml() + '</select>' +
    '<button class="btn-primary" id="ac-save">Выдать карту клиенту</button>' +
    '<div id="ac-msg" class="msg"></div>' +
  '</div>';
}

function wireActivateForm(id) {
  var btn = document.getElementById('ac-save');
  btn.onclick = function () {
    setBtnLoading(btn, 'Оформляем…');
    apiPost('activateCard', {
      username: state.user.username, cardId: id,
      name: document.getElementById('ac-name').value.trim(),
      phone: document.getElementById('ac-phone').value.trim(),
      months: document.getElementById('ac-months').value
    }).then(function (res) {
      if (res.success) { toast('Карта выдана клиенту'); renderScanResult(res.card); }
      else { clearBtnLoading(btn); var m = document.getElementById('ac-msg'); m.className = 'msg err'; m.textContent = res.error; }
    }).catch(function () { clearBtnLoading(btn); });
  };
}

function prefillNewFrom(id) { go('new'); setTimeout(function () { var el = document.getElementById('nw-id'); if (el) el.value = id; }, 50); }

/** Быстрый переход на вкладку «Сканер» с сразу же включённой камерой — чтобы не делать два отдельных клика (перейти + включить) */
function goScanAndStart() {
  go('scan');
  setTimeout(function () { if (!state.scanning && !state.starting) toggleScanner(); }, 60);
}

// ============================ ВКЛАДКА: ВСЕ КАРТЫ ============================
function viewList(v) {
  var cached = state.cardsCache;
  v.innerHTML =
    '<div class="stats" id="stats">' + (cached ? statsHtml(cached.stats) : skeletonStats()) + '</div>' +
    '<div class="card">' +
      '<h2 style="margin-bottom:12px;">Все карты</h2>' +
      '<input id="ls-search" placeholder="Поиск по номеру, имени или телефону">' +
      '<div class="clist" id="ls-body" style="margin-top:14px;">' + (cached ? cardsListHtml(cached.cards) : skeletonRows(4)) + '</div>' +
    '</div>';
  document.getElementById('ls-search').addEventListener('input', debounce(refreshList, 250));
  if (cached) wireListRows(cached.cards);
  // если кэш уже есть — показываем его мгновенно, а актуальные данные подтягиваем в фоне без мигания «Загрузка…»
  refreshList();
}

function statsHtml(s) {
  return '<div class="stat"><div class="n">' + s.total + '</div><div class="l">Всего</div></div>' +
    '<div class="stat a"><div class="n">' + s.active + '</div><div class="l">Активны</div></div>' +
    '<div class="stat w"><div class="n">' + s.soon + '</div><div class="l">Скоро</div></div>' +
    '<div class="stat e"><div class="n">' + s.expired + '</div><div class="l">Истекли</div></div>';
}

function cardsListHtml(cards) {
  if (!cards || !cards.length) return '<p class="sub" style="margin:0;">Ничего не найдено.</p>';
  return cards.map(function (c) {
    var meta = [];
    if (c.phone) meta.push(esc(c.phone));
    if (c.endDate) meta.push('до ' + esc(c.endDate));
    return '<div class="citem" data-row="' + esc(c.id) + '">' +
      '<div class="who">' +
        '<div class="nm">' + esc(c.name || 'Без имени') + '</div>' +
        '<div class="meta">' + meta.join(' · ') + '</div>' +
        '<div class="cid">' + esc(c.id) + '</div>' +
      '</div>' +
      '<div class="right">' +
        '<span class="badge s-' + c.status + '">' + STATUS_LABEL[c.status] + '</span>' +
        '<div style="display:flex; gap:6px;">' +
          '<span class="icon-btn" title="QR-код" data-qr="' + esc(c.id) + '">' + ICON.qr + '</span>' +
          '<span class="icon-btn" title="Изменить" data-edit="' + esc(c.id) + '">' + ICON.edit + '</span>' +
          '<span class="icon-btn" title="Удалить" data-del="' + esc(c.id) + '" style="color:var(--red);">' + ICON.trash + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function wireListRows(cards) {
  var body = document.getElementById('ls-body'); if (!body) return;
  cards.forEach(function (c) {
    var row = body.querySelector('[data-row="' + cssEsc(c.id) + '"]'); if (!row) return;
    row.querySelector('[data-qr]').onclick = function () { showQrModal(c.id); };
    row.querySelector('[data-edit]').onclick = function () { showEditModal(c); };
    row.querySelector('[data-del]').onclick = function () { confirmDeleteCard(c, row); };
  });
}

function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }

function refreshList() {
  var qEl = document.getElementById('ls-search');
  var q = qEl ? qEl.value : '';
  apiGet('getCardsScreen', { q: q }).then(function (res) {
    if (!res || res.error) return;
    if (!q) state.cardsCache = res; // кэшируем только незафильтрованный список — именно его показываем при повторном открытии вкладки
    var statsEl = document.getElementById('stats'); if (statsEl) statsEl.innerHTML = statsHtml(res.stats);
    var body = document.getElementById('ls-body'); if (!body) return;
    body.innerHTML = cardsListHtml(res.cards);
    wireListRows(res.cards);
  });
}

function confirmDeleteCard(c, rowEl) {
  openModal(
    '<h2>Удалить карту?</h2>' +
    '<p class="sub">' + esc(c.name || 'Без имени') + ' · ' + esc(c.id) + '<br>Действие необратимо.</p>' +
    '<div class="row-btns" style="margin-top:16px;">' +
      '<button class="btn-ghost" onclick="closeModal()">Отмена</button>' +
      '<button class="btn-danger" id="md-del">Удалить</button>' +
    '</div>'
  );
  var btn = document.getElementById('md-del');
  btn.onclick = function () {
    setBtnLoading(btn, 'Удаляем…');
    closeModal(); // закрываем сразу — не заставляем ждать ответ сервера, чтобы продолжить работу
    if (rowEl) { rowEl.classList.add('removing'); setTimeout(function () { if (rowEl.parentNode) rowEl.remove(); }, 180); }
    if (state.cardsCache) state.cardsCache.cards = state.cardsCache.cards.filter(function (x) { return x.id !== c.id; });
    toast('Карта удаляется…');
    apiPost('deleteCard', { cardId: c.id }).then(function (res) {
      if (res.success) { toast('Карта удалена'); }
      else { alert(res.error); refreshList(); } // если сервер отказал — переcобираем список, чтобы вернуть строку обратно
    }).catch(function () { refreshList(); });
  };
}

function viewStaff(v) {
  var cached = state.staffCache;
  v.innerHTML =
    '<div class="card">' +
      '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">' +

        '<button class="btn-secondary btn-sm" onclick="showUserModal(null)">+ Добавить</button>' +

    '</div>';

function staffListHtml(users) {
  return (users || []).map(function (usr) {
    var roleBadge = usr.role === 'admin' ? '<span class="badge s-active">Админ</span>' : '<span class="badge s-no_data">Кассир</span>';
    var isMe = usr.login.toLowerCase() === state.user.username.toLowerCase();
    return '<div class="citem" data-urow="' + esc(usr.login) + '">' +
      '<div class="who"><div class="nm">' + esc(usr.fullName) + (isMe ? ' <span style="color:var(--muted); font-weight:400;">(вы)</span>' : '') + '</div>' +
        '<div class="meta">логин: ' + esc(usr.login) + '</div></div>' +
      '<div class="right">' + roleBadge +
        '<div style="display:flex; gap:6px;">' +
          '<span class="icon-btn" data-edit>' + ICON.edit + '</span>' +
          (isMe ? '' : '<span class="icon-btn" data-del style="color:var(--red);">' + ICON.trash + '</span>') +
        '</div></div>' +
    '</div>';
  }).join('');
}

function wireStaffRows(users) {
  var body = document.getElementById('st-body'); if (!body) return;
  (users || []).forEach(function (usr) {
    var row = body.querySelector('[data-urow="' + cssEsc(usr.login) + '"]'); if (!row) return;
    row.querySelector('[data-edit]').onclick = function () { showUserModal(usr); };
    var del = row.querySelector('[data-del]');
    if (del) del.onclick = function () { confirmDeleteUser(usr, row); };
  });
}

function refreshStaff() {
  apiGet('listUsers', {}).then(function (users) {
    state.staffCache = users || [];
    var body = document.getElementById('st-body'); if (!body) return;
    body.innerHTML = staffListHtml(users);
    wireStaffRows(users);
  });
}

    '<label>Пароль' + (isNew ? '' : ' (оставьте пустым, чтобы не менять)') + '</label><input id="us-pass" type="password" autocomplete="new-password">' +
    '<label>Роль</label><select id="us-role">' +
      '<option value="cashier"' + (!isNew && usr.role === 'cashier' ? ' selected' : '') + '>Кассир</option>' +
      '<option value="admin"' + (!isNew && usr.role === 'admin' ? ' selected' : '') + '>Администратор</option>' +

  );
  document.getElementById('us-save').onclick = function () {
    var btn = this;
    var payload = {

      role: document.getElementById('us-role').value,

      else { clearBtnLoading(btn); var m = document.getElementById('us-msg'); m.className = 'msg err'; m.textContent = res.error; }

}

/** Блок настроек фона наклейки — грузим свежие настройки при каждом открытии вкладки, чтобы админ всегда видел актуальное состояние */
function renderBgSettings() {
  apiGet('getSettings', {}).then(function (s) {
    state.settings = s;
    var card = document.getElementById('bg-card');
    if (!card) return; // ушли с вкладки, пока грузилось
    card.innerHTML =
      '<h2>Фон для наклейки карты</h2>' +
      '<p class="sub">Загрузите картинку болванки — она станет фоном наклейки вместо стандартного шаблона, а QR-код автоматически ляжет поверх в заданном месте. Применяется сразу везде: во вкладках «Карты», «Новая» и «Печать». Ползунки ниже двигают QR даже до загрузки фона — так видно, куда он встанет.</p>' +
      '<input type="file" accept="image/*" id="bg-file">' +
      '<div class="bg-preview-wrap" id="bg-preview">' + bgPreviewHtml(s.backgroundImageUrl, s.qrX, s.qrY, s.qrSize) + '</div>' +
      '<label>Смещение QR по горизонтали (%)</label><input type="range" id="bg-x" min="0" max="75" value="' + s.qrX + '">' +
      '<label>Смещение QR по вертикали (%)</label><input type="range" id="bg-y" min="0" max="75" value="' + s.qrY + '">' +
      '<label>Размер QR (%)</label><input type="range" id="bg-size" min="15" max="70" value="' + s.qrSize + '">' +
      '<button class="btn-primary" id="bg-save">Сохранить фон</button>' +
      (s.backgroundImageUrl ? '<button class="btn-ghost" id="bg-remove" style="width:100%; margin-top:8px;">Убрать фон (вернуть обычный шаблон)</button>' : '') +
      '<div id="bg-msg" class="msg"></div>';
    wireBgSettings(s);
  }).catch(function () {
    var card = document.getElementById('bg-card');
    if (card) card.innerHTML = '<h2>Фон для наклейки карты</h2><p class="msg err">Не удалось загрузить настройки. Откройте вкладку заново.</p>';
  });
}

/** Превью для настроек: в отличие от обычной наклейки, всегда показывает позицию QR — если фона ещё нет, рисует нейтральную заглушку вместо него, чтобы ползунки были видны в деле */
function bgPreviewHtml(bgUrl, x, y, size) {
  var g = clampQrGeometry(x, y, size);
  var bgStyle = bgUrl
    ? 'background-image:url(&quot;' + esc(bgUrl) + '&quot;); background-size:cover; background-position:center;'
    : 'background:repeating-conic-gradient(#eef1ec 0% 25%, #ffffff 0% 50%) 0 0/14px 14px;';
  return '<div class="pcard has-bg" style="' + bgStyle + '">' +
    '<div class="pcard-qr" style="left:' + g.xMm + 'mm; top:' + g.yMm + 'mm; width:' + g.szMm + 'mm; height:' + g.szMm + 'mm;">' +
      qrImgHtml(cardLink('LC-000000')) +
    '</div>' +
    (bgUrl ? '' : '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;"><span style="background:rgba(255,255,255,.85); padding:2px 7px; border-radius:6px; font-size:9px; color:var(--muted); font-weight:600;">фон ещё не загружен</span></div>') +
  '</div>';
}

function wireBgSettings(s) {
  var pendingDataUrl = null;
  var currentBgUrl = s.backgroundImageUrl || '';

  function currentSrc() { return pendingDataUrl || currentBgUrl; }
  function updatePreview() {
    var x = document.getElementById('bg-x').value, y = document.getElementById('bg-y').value, sz = document.getElementById('bg-size').value;
    var prev = document.getElementById('bg-preview');
    prev.innerHTML = bgPreviewHtml(currentSrc(), x, y, sz);
  }

  document.getElementById('bg-file').addEventListener('change', function (e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var msg = document.getElementById('bg-msg');
    msg.className = 'msg'; msg.textContent = 'Обрабатываем изображение…';
    resizeImageFile(file, 1200, 0.85).then(function (dataUrl) {
      pendingDataUrl = dataUrl;
      msg.textContent = '';
      updatePreview();
    }).catch(function () { msg.className = 'msg err'; msg.textContent = 'Не удалось прочитать это изображение.'; });
  });

  ['bg-x', 'bg-y', 'bg-size'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', updatePreview);
  });

  document.getElementById('bg-save').onclick = function () {
    var btn = this;
    var msg = document.getElementById('bg-msg');
    if (!pendingDataUrl && !currentBgUrl) { msg.className = 'msg err'; msg.textContent = 'Сначала выберите картинку.'; return; }
    setBtnLoading(btn, 'Сохраняем…');
    apiPost('saveSettings', {
      actorRole: state.user.role,
      backgroundImage: pendingDataUrl || undefined,
      qrX: document.getElementById('bg-x').value,
      qrY: document.getElementById('bg-y').value,
      qrSize: document.getElementById('bg-size').value
    }).then(function (res) {
      clearBtnLoading(btn);
      if (res.success) {
        state.settings = res.settings;
        toast('Фон сохранён');
        renderBgSettings();
      } else { msg.className = 'msg err'; msg.textContent = res.error; }
    }).catch(function () { clearBtnLoading(btn); msg.className = 'msg err'; msg.textContent = 'Нет связи с сервером'; });
  };

  var removeBtn = document.getElementById('bg-remove');
  if (removeBtn) removeBtn.onclick = function () {
    var btn = this;
    setBtnLoading(btn, 'Убираем…');
    apiPost('saveSettings', { actorRole: state.user.role, clearBackground: true }).then(function (res) {
      clearBtnLoading(btn);
      if (res.success) { state.settings = res.settings; toast('Фон убран'); renderBgSettings(); }
      else alert(res.error);
    }).catch(function () { clearBtnLoading(btn); });
  };
}

/** Уменьшает выбранную картинку до разумного размера перед отправкой на сервер — быстрее загрузка, меньше места на Диске */
function resizeImageFile(file, maxDim, quality) {
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        var cw = Math.max(1, Math.round(img.width * scale));
        var ch = Math.max(1, Math.round(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
        resolve(canvas.toDataURL('image/jpeg', quality || 0.85));
      };
      img.onerror = function () { reject(new Error('bad image')); };
      img.src = reader.result;
    };
    reader.onerror = function () { reject(new Error('read error')); };
    reader.readAsDataURL(file);
  });
}

function exportCsv() {
  window.open(API_BASE_URL + '?action=exportCsv', '_blank');
}

// ============================ УТИЛИТЫ ============================
function openModal(html) {
  closeModal();
  var ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'overlay';
  ov.innerHTML = '<div class="modal">' + html + '</div>';
  ov.addEventListener('click', function (e) { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { var ov = document.getElementById('overlay'); if (ov) ov.remove(); }

function toast(text) {
  var t = document.createElement('div');
  t.textContent = text;
  t.style.cssText = 'position:fixed; left:50%; bottom:78px; transform:translateX(-50%); background:var(--brand-dark); color:#fff; padding:11px 18px; border-radius:100px; font-size:14px; font-weight:600; z-index:80; box-shadow:0 6px 20px rgba(0,0,0,.2);';
  document.body.appendChild(t);
  setTimeout(function () { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 300); }, 1800);
}

function debounce(fn, ms) {
  var timer;
  return function () { clearTimeout(timer); timer = setTimeout(fn, ms); };
}

/** Склонение слова «месяц» под число (1 месяц, 2 месяца, 5 месяцев, 11 месяцев, 21 месяц…) */
function monthWord(n) {
  var last2 = n % 100;
  if (last2 >= 11 && last2 <= 14) return 'месяцев';
  switch (n % 10) {
    case 1: return 'месяц';
    case 2: case 3: case 4: return 'месяца';
    default: return 'месяцев';
  }
}

/** <option> для выбора срока подписки — весь диапазон от 1 до 12 месяцев */
function monthOptionsHtml() {
  var out = '';
  for (var m = 1; m <= 12; m += 1) {
    out += '<option value="' + m + '">' + m + ' ' + monthWord(m) + '</option>';
  }
  return out;
}

/** Показывает спиннер на кнопке и блокирует повторное нажатие, пока идёт запрос к серверу */
function setBtnLoading(btn, label) {
  if (!btn || btn.dataset.loading === '1') return;
  btn.dataset.loading = '1';
  btn.dataset.origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>' + esc(label || 'Секунду…');
}
function clearBtnLoading(btn) {
  if (!btn) return;
  btn.disabled = false;
  btn.dataset.loading = '0';
  if (btn.dataset.origHtml !== undefined) btn.innerHTML = btn.dataset.origHtml;
}

function skeletonStats() {
  var out = '';
  for (var i = 0; i < 4; i++) out += '<div class="skel skel-stat"></div>';
  return out;
}
function skeletonRows(n) {
  var out = '';
  for (var i = 0; i < (n || 3); i++) out += '<div class="skel skel-row"></div>';
  return out;
}
